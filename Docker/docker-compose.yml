version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"    # RabbitMQ main port
      - "15672:15672"  # RabbitMQ management port
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: root0603
    networks:
      - my-network
   #volumes:
    # - ./rabbitmq:/var/lib/rabbitmq  # Optional: Persist RabbitMQ data
    
networks:
  my-network:
    driver: bridge

